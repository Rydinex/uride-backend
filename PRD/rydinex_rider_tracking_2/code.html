<div class="flex items-center gap-4">

<div class="w-full h-full bg-surface-container-lowest relative overflow-hidden">

<div class="absolute inset-0 bg-gradient-to-r from-transparent via-primary to-transparent animate-pulse"></div>
</div>
<!-- Driver Marker -->
<div class="absolute top-[45%] left-[30%] -translate-x-1/2 -translate-y-1/2">
<div class="relative flex items-center justify-center">
<div class="absolute w-12 h-12 bg-primary/20 rounded-full animate-ping"></div>
<div class="bg-primary-container text-on-primary-container p-2 rounded-xl shadow-2xl flex items-center justify-center border-2 border-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">directions_car</span>
</div>
</div>
</div>
<!-- Destination Marker -->
<div class="absolute top-[55%] left-[70%] -translate-x-1/2 -translate-y-1/2">
<div class="flex flex-col items-center">
<div class="bg-tertiary-container text-on-tertiary-container p-2 rounded-full shadow-2xl border-2 border-tertiary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<div class="mt-2 bg-surface/80 backdrop-blur-md px-3 py-1 rounded-lg border border-outline-variant/30">
<p class="text-[10px] font-bold uppercase tracking-widest text-on-surface">Mission District</p>
</div>
</div>
</div>
</div>
</div>
<!-- Floating UI Overlays -->
<div class="relative z-10 px-6 pt-4 flex flex-col gap-4">
<!-- Trip Progress HUD -->
<div class="bg-surface-container-low/80 backdrop-blur-xl border border-outline-variant/10 p-6 rounded-2xl shadow-2xl max-w-md mx-auto w-full">
<div class="flex justify-between items-end mb-4">
<div>
<p class="font-label text-xs font-medium text-on-surface-variant uppercase tracking-widest mb-1">Arriving In</p>
<h2 class="font-headline text-4xl font-extrabold text-primary tracking-tight">8<span class="text-xl ml-1">mins</span></h2>
</div>
<div class="text-right">
<p class="font-label text-xs font-medium text-on-surface-variant uppercase tracking-widest mb-1">Distance</p>
<p class="font-headline text-xl font-bold text-on-surface">2.4 <span class="text-sm opacity-60">km</span></p>
</div>
</div>
<!-- Progress Bar -->
<div class="h-1.5 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary-container w-2/3 rounded-full relative">
<div class="absolute right-0 top-1/2 -translate-y-1/2 w-3 h-3 bg-white rounded-full shadow-lg"></div>
</div>
</div>
</div>
</div>
<!-- Bottom Detail Sheet -->
<div class="fixed bottom-24 left-0 w-full z-20 px-4">
<div class="max-w-xl mx-auto bg-surface-container/95 backdrop-blur-2xl rounded-3xl p-6 shadow-[0_-20px_60px_-15px_rgba(0,0,0,0.5)] border-t border-outline-variant/10">
<!-- Driver Info Section -->
<div class="flex items-center justify-between mb-8">
<div class="flex items-center gap-4">
<div class="relative">
<img class="w-16 h-16 rounded-2xl object-cover border-2 border-primary/20" data-alt="Professional driver profile photo, middle-aged man with a warm smile, wearing a clean polo shirt in bright daylight" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDsJw27kAhJzsbS40zwAZh6fFdYfi5fn1-pbRV3qGSg0UI97G1HH7blR7RVuBys514Ylsr1HVMTypGACR6eN3GlTS67Inlq_VnX3JDqqpEaewT5lbkScT83MEiQtejPOrs_BFm7LYu-aDOVTUFA7MZWNcrmB6WQ4zdfSe--UlhnE6RyCfKMxADkf4z7whbefNksp3ts1D_H5fpY7lvIYibCBU6suORWecqZ68O5dIBwCS4z_w1qQ-1_U8lMeAI5Lj6gWHWJ_cHkC98"/>
<div class="absolute -bottom-2 -right-2 bg-tertiary text-on-tertiary font-bold text-[10px] px-2 py-0.5 rounded-full flex items-center gap-1 shadow-lg">
<span class="material-symbols-outlined text-[12px]" style="font-variation-settings: 'FILL' 1;">star</span>
                                4.9
                            </div>
</div>
<div>
<h3 class="font-headline text-xl font-bold text-on-surface">Marcus Chen</h3>
<p class="text-on-surface-variant/70 text-sm">Black Tesla Model 3</p>
<div class="mt-1 bg-surface-container-highest inline-block px-2 py-0.5 rounded-md border border-outline-variant/30">
<p class="font-manrope text-[10px] font-extrabold tracking-widest text-on-surface">CA 7VYP922</p>
</div>
</div>
</div>
<div class="flex gap-2">
<button class="w-12 h-12 rounded-xl bg-surface-container-highest flex items-center justify-center text-primary hover:bg-primary/10 transition-colors active:scale-90 duration-200">
<span class="material-symbols-outlined">call</span>
</button>
<button class="w-12 h-12 rounded-xl bg-surface-container-highest flex items-center justify-center text-primary hover:bg-primary/10 transition-colors active:scale-90 duration-200">
<span class="material-symbols-outlined">chat_bubble</span>
</button>
</div>
</div>

<div class="flex gap-3">
<button class="flex-1 bg-primary-container text-on-primary-container py-4 rounded-xl font-bold flex items-center justify-center gap-2 active:scale-95 duration-200 shadow-xl shadow-primary/20">
<span class="material-symbols-outlined">shield</span>
                        Safety Toolkit

<span class="material-symbols-outlined mb-1">home</span>
<span class="font-inter text-[10px] font-medium uppercase tracking-widest">Home</span>
