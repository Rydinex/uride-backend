<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Velocity - Premium Ride-sharing</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary": "#ffb694",
              "secondary": "#b1c5ff",
              "surface-container-high": "#2a2a2b",
              "on-surface": "#e5e2e3",
              "background": "#131314",
              "inverse-on-surface": "#303031",
              "inverse-surface": "#e5e2e3",
              "surface-variant": "#353436",
              "on-primary-container": "#fffeff",
              "on-surface-variant": "#c2c6d7",
              "secondary-fixed-dim": "#b1c5ff",
              "tertiary-container": "#c65100",
              "on-secondary-fixed": "#001947",
              "on-error": "#690005",
              "outline": "#8c90a0",
              "inverse-primary": "#0056d0",
              "secondary-fixed": "#dae2ff",
              "on-error-container": "#ffdad6",
              "error-container": "#93000a",
              "surface-tint": "#b1c5ff",
              "surface": "#131314",
              "on-tertiary-fixed": "#351000",
              "on-primary-fixed": "#001947",
              "on-background": "#e5e2e3",
              "on-secondary-container": "#a2b7f3",
              "surface-dim": "#131314",
              "primary-container": "#276ef1",
              "on-primary": "#002c71",
              "on-tertiary": "#561f00",
              "on-secondary": "#162e61",
              "tertiary-fixed-dim": "#ffb694",
              "on-tertiary-fixed-variant": "#7b2f00",
              "surface-container": "#1f1f20",
              "on-secondary-fixed-variant": "#2f4579",
              "tertiary-fixed": "#ffdbcc",
              "outline-variant": "#424654",
              "surface-container-highest": "#353436",
              "secondary-container": "#31477c",
              "primary-fixed": "#dae2ff",
              "surface-container-lowest": "#0e0e0f",
              "on-tertiary-container": "#fffdff",
              "primary": "#b1c5ff",
              "surface-container-low": "#1b1b1c",
              "surface-bright": "#39393a",
              "on-primary-fixed-variant": "#00419f",
              "error": "#ffb4ab",
              "primary-fixed-dim": "#b1c5ff"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .map-gradient-overlay {
            background: linear-gradient(180deg, rgba(19,19,20,0.8) 0%, rgba(19,19,20,0) 25%, rgba(19,19,20,0) 75%, rgba(19,19,20,1) 100%);
        }
        .glass-panel {
            backdrop-filter: blur(20px);
            background: rgba(53, 52, 54, 0.6);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body min-h-screen">
<header class="sticky top-0 z-50 bg-surface/80 backdrop-blur-xl border-b border-outline-variant/20">
<div class="h-16 px-5 flex items-center justify-between">
<h1 class="font-headline font-extrabold text-xl tracking-tight text-primary">Rydinex Request Ride</h1>
<button class="w-10 h-10 rounded-full bg-surface-container-highest/50 flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant">notifications</span>
</button>
</div>
</header>

<main class="max-w-3xl mx-auto px-4 pb-8 space-y-4">
<section class="rounded-2xl overflow-hidden border border-outline-variant/20 bg-surface-container relative">
<img class="w-full h-56 object-cover opacity-50" data-alt="city map in dark mode with highlighted roads" src="https://images.unsplash.com/photo-1569336415962-a4bd9f69cd83?auto=format&fit=crop&w=1400&q=80"/>
<div class="absolute inset-0 pointer-events-none">
<span id="pickupPin" class="material-symbols-outlined text-primary absolute left-1/3 top-1/3 text-3xl">location_on</span>
<span id="destinationPin" class="material-symbols-outlined text-tertiary absolute right-1/3 bottom-1/3 text-3xl">flag</span>
</div>
<div class="p-3 grid grid-cols-1 sm:grid-cols-3 gap-2 bg-surface-container-high/85">
<button id="setPickupBtn" class="h-10 rounded-xl bg-primary-container text-on-primary-container text-xs font-bold uppercase tracking-wider">Set Pickup Location</button>
<button id="setDestinationBtn" class="h-10 rounded-xl bg-surface-container-highest text-on-surface text-xs font-bold uppercase tracking-wider">Set Destination</button>
<button id="myLocationBtn" class="h-10 rounded-xl bg-surface-container-highest text-on-surface text-xs font-bold uppercase tracking-wider">Use Current Location</button>
</div>
</section>

<section class="rounded-2xl bg-surface-container p-4 border border-outline-variant/20 space-y-4">
<div>
<label class="text-xs font-bold tracking-widest uppercase text-on-surface-variant">Pickup</label>
<div class="mt-1 flex gap-2">
<input id="pickupInput" class="flex-1 rounded-xl bg-surface-container-highest border border-outline-variant/30 px-3 py-2 text-sm" type="text" value="123 Main St" placeholder="Where should we pick you up?"/>
<button class="rounded-xl px-3 py-2 text-xs font-bold uppercase tracking-wider bg-surface-container-highest">Choose on Map</button>
</div>
</div>

<div>
<label class="text-xs font-bold tracking-widest uppercase text-on-surface-variant">Destination</label>
<div class="mt-1 flex gap-2">
<input id="destinationInput" class="flex-1 rounded-xl bg-surface-container-highest border border-outline-variant/30 px-3 py-2 text-sm" type="text" value="Airport Terminal 1" placeholder="Where are you going?"/>
<button class="rounded-xl px-3 py-2 text-xs font-bold uppercase tracking-wider bg-surface-container-highest">Choose on Map</button>
</div>
</div>

<div>
<p class="text-xs font-bold tracking-widest uppercase text-on-surface-variant mb-2">Ride Type</p>
<div id="rideTypeGroup" class="grid grid-cols-2 sm:grid-cols-3 gap-2">
<button data-fare="1.8" class="ride-type h-11 rounded-xl border border-primary bg-primary/20 text-primary font-bold text-xs uppercase tracking-wider">Rydinex Black</button>
<button data-fare="2.2" class="ride-type h-11 rounded-xl border border-outline-variant/40 text-on-surface text-xs font-bold uppercase tracking-wider">Rydinex BlackSUV</button>
<button data-fare="1" class="ride-type h-11 rounded-xl border border-outline-variant/40 text-on-surface text-xs font-bold uppercase tracking-wider">Rydinex Regular</button>
<button data-fare="1.3" class="ride-type h-11 rounded-xl border border-outline-variant/40 text-on-surface text-xs font-bold uppercase tracking-wider">Rydinex Comfort</button>
<button data-fare="1.5" class="ride-type h-11 rounded-xl border border-outline-variant/40 text-on-surface text-xs font-bold uppercase tracking-wider">Rydinex XL</button>
<button data-fare="1.1" class="ride-type h-11 rounded-xl border border-outline-variant/40 text-on-surface text-xs font-bold uppercase tracking-wider">Rydinex Economy</button>
</div>
</div>

<div class="rounded-2xl bg-surface-container-highest/60 border border-outline-variant/20 p-3">
<div class="flex items-center justify-between">
<p class="text-xs uppercase tracking-widest font-bold text-on-surface-variant">Fare Estimate</p>
<button id="refreshEstimateBtn" class="text-xs font-bold uppercase tracking-widest text-primary">Refresh Estimate</button>
</div>
<div class="mt-2 flex items-end justify-between">
<div>
<p class="text-sm text-on-surface-variant">Estimated Distance</p>
<p id="distanceValue" class="font-headline font-extrabold text-2xl">5.4 km</p>
</div>
<div class="text-right">
<p class="text-sm text-on-surface-variant">Estimated Price</p>
<p id="fareValue" class="font-headline font-extrabold text-3xl text-primary">$12.40</p>
</div>
</div>
</div>
</section>

<section class="rounded-2xl bg-surface-container p-4 border border-outline-variant/20">
<p class="text-xs font-bold tracking-widest uppercase text-on-surface-variant mb-3">Main Actions</p>
<div class="grid grid-cols-2 sm:grid-cols-3 gap-2">
<button class="h-11 rounded-xl bg-primary-container text-on-primary-container font-bold text-xs uppercase tracking-wider">Request Ride</button>
<button class="h-11 rounded-xl bg-surface-container-highest font-bold text-xs uppercase tracking-wider">Schedule</button>
<button class="h-11 rounded-xl bg-surface-container-highest font-bold text-xs uppercase tracking-wider">Apply Promo</button>
<button class="h-11 rounded-xl bg-surface-container-highest font-bold text-xs uppercase tracking-wider">Payment Method</button>
<button class="h-11 rounded-xl bg-error-container/30 text-error font-bold text-xs uppercase tracking-wider">Cancel</button>
</div>
</section>
</main>

<script>
  (function () {
    var baseDistance = 5.4;
    var surge = 1.0;
    var selectedRate = 1.8;
    var baseFare = 2.00;
    var fareValue = document.getElementById("fareValue");
    var distanceValue = document.getElementById("distanceValue");
    var pickupInput = document.getElementById("pickupInput");
    var destinationInput = document.getElementById("destinationInput");

    function recalcFare() {
      var fare = baseFare + (baseDistance * selectedRate * surge);
      distanceValue.textContent = baseDistance.toFixed(1) + " km";
      fareValue.textContent = "$" + fare.toFixed(2);
    }

    function selectRideType(btn) {
      var all = document.querySelectorAll(".ride-type");
      all.forEach(function (node) {
        node.classList.remove("border-primary", "bg-primary/20", "text-primary");
        node.classList.add("border-outline-variant/40", "text-on-surface");
      });
      btn.classList.add("border-primary", "bg-primary/20", "text-primary");
      btn.classList.remove("border-outline-variant/40", "text-on-surface");
      selectedRate = parseFloat(btn.getAttribute("data-fare") || "1.0");
      recalcFare();
    }

    document.querySelectorAll(".ride-type").forEach(function (btn) {
      btn.addEventListener("click", function () { selectRideType(btn); });
    });

    document.getElementById("refreshEstimateBtn").addEventListener("click", function () {
      baseDistance = Math.max(1.2, (baseDistance + ((Math.random() * 0.8) - 0.4)));
      surge = Math.random() > 0.8 ? 1.15 : 1.0;
      recalcFare();
    });

    document.getElementById("setPickupBtn").addEventListener("click", function () {
      pickupInput.value = "Current Position - Market St";
    });

    document.getElementById("setDestinationBtn").addEventListener("click", function () {
      destinationInput.value = "Downtown Terminal";
    });

    document.getElementById("myLocationBtn").addEventListener("click", function () {
      pickupInput.value = "Using Current Location";
    });

    recalcFare();
  })();
</script>
<script src="../apps/prd-manifest.js"></script>
<script src="../apps/prd-runtime.js"></script>
</body></html>
