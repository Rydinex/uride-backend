<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">

        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-container": "#276ef1",
              "secondary-container": "#31477c",
              "on-tertiary-fixed-variant": "#7b2f00",
              "on-secondary": "#162e61",
              "surface-container-lowest": "#0e0e0f",
              "inverse-on-surface": "#303031",
              "outline": "#8c90a0",
              "on-surface": "#e5e2e3",
              "surface-container-highest": "#353436",
              "primary": "#b1c5ff",
              "surface-variant": "#353436",
              "on-error": "#690005",
              "tertiary-fixed": "#ffdbcc",
              "tertiary": "#ffb694",
              "tertiary-fixed-dim": "#ffb694",
              "surface-tint": "#b1c5ff",
              "surface-dim": "#131314",
              "on-tertiary-fixed": "#351000",
              "secondary": "#b1c5ff",
              "on-secondary-fixed": "#001947",
              "surface-container-low": "#1b1b1c",
              "on-tertiary": "#561f00",
              "on-background": "#e5e2e3",
              "on-secondary-fixed-variant": "#2f4579",
              "on-error-container": "#ffdad6",
              "error": "#ffb4ab",
              "surface-bright": "#39393a",
              "on-primary-container": "#fffeff",
              "primary-fixed": "#dae2ff",
              "inverse-surface": "#e5e2e3",
              "tertiary-container": "#c65100",
              "on-primary-fixed-variant": "#00419f",
              "on-primary-fixed": "#001947",
              "surface": "#131314",
              "background": "#131314",
              "surface-container-high": "#2a2a2b",
              "on-surface-variant": "#c2c6d7",
              "surface-container": "#1f1f20",
              "secondary-fixed-dim": "#b1c5ff",
              "on-secondary-container": "#a2b7f3",
              "primary-fixed-dim": "#b1c5ff",
              "outline-variant": "#424654",
              "secondary-fixed": "#dae2ff",
              "error-container": "#93000a",
              "inverse-primary": "#0056d0",
              "on-primary": "#002c71",
              "on-tertiary-container": "#fffdff"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-pulse-glow {
            background: radial-gradient(circle at center, rgba(39, 110, 241, 0.08) 0%, rgba(19, 19, 20, 0) 70%);
        }
        .glass-card {
            background: rgba(53, 52, 54, 0.4);
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container min-h-screen">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-20 bg-[#131314]">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-surface-container-highest overflow-hidden">
<img alt="Driver profile" class="w-full h-full object-cover" data-alt="close-up portrait of a professional man in a clean polo shirt smiling warmly against a soft urban background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD4wewo2kopgiFlh2hy63AaE7NRsHFYKGO9rbrYVC-ArClZAaN0YOnoTHQxp5nzObNGmspFwu3z0k1R0kV2sSfWcMihQQyO3BxBv-p93oxy9DnR2nekd3N4VUHqs_u2tb4gCY_NJcLrCWaZFVqmYy8q4vq1B0zYqxoueshGBAAotoLdC0h2L7l1k7S84in6UIv6mqAC3vHwe9Zm5Whh3VqcShzq_qSz0z4Gy-6ZQbOTA3vYQSf4Ik5Rq8G40V9Ps6FYTcjAXoR7omA"/>
</div>
<span class="font-headline font-bold text-[#b1c5ff] tracking-tighter text-2xl">Rydinex</span>
</div>
<div class="bg-tertiary/10 px-4 py-1.5 rounded-full">
<span class="text-tertiary font-headline font-extrabold tracking-widest text-xs uppercase">BREAK MODE</span>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-lg mx-auto min-h-screen relative flex flex-col justify-center overflow-hidden">
<!-- Calming Pulse Background -->
<div class="absolute inset-0 z-0 bg-pulse-glow pointer-events-none"></div>
<!-- Hero Section -->
<section class="relative z-10 text-center mb-12">
<div class="mb-8 flex justify-center">
<div class="w-24 h-24 rounded-full bg-surface-container-low flex items-center justify-center relative">
<div class="absolute inset-0 rounded-full border-4 border-tertiary/20 scale-125"></div>
<span class="material-symbols-outlined text-tertiary text-5xl" data-icon="coffee">coffee</span>
</div>
</div>
<h1 class="font-headline text-display-lg text-4xl font-extrabold tracking-tight mb-4 leading-tight">
                You're on a break.
            </h1>
<p class="text-on-surface-variant text-lg max-w-[280px] mx-auto opacity-80">
                Take this time to recharge! You've been doing great today.
            </p>
</section>
<!-- Bento Grid Stats (Dimmed) -->
<div class="grid grid-cols-2 gap-4 relative z-10 mb-10 opacity-40 grayscale-[0.5]">
<div class="glass-card p-5 rounded-xl border border-white/5">
<p class="text-[10px] font-label uppercase tracking-widest text-on-surface-variant mb-1">Total Earned</p>
<p class="font-headline text-2xl font-bold text-on-surface">$142.50</p>
</div>
<div class="glass-card p-5 rounded-xl border border-white/5">
<p class="text-[10px] font-label uppercase tracking-widest text-on-surface-variant mb-1">Next Trip</p>
<p class="font-headline text-2xl font-bold text-on-surface">14:30</p>
</div>
<div class="glass-card p-5 rounded-xl border border-white/5 col-span-2 flex items-center justify-between">
<div>
<p class="text-[10px] font-label uppercase tracking-widest text-on-surface-variant mb-1">Scheduled Pick-up</p>
<p class="font-headline text-lg font-bold text-on-surface">Grand Central Terminal</p>
</div>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="event">event</span>
</div>
</div>
<!-- Action Button -->
<div class="relative z-10 flex flex-col gap-4">
<button class="w-full bg-primary-container text-on-primary-container py-5 rounded-xl font-headline font-bold text-lg shadow-[0_20px_40px_rgba(39,110,241,0.3)] active:scale-[0.98] transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined" data-icon="bolt" data-weight="fill" style="font-variation-settings: 'FILL' 1;">bolt</span>
                Go Online
            </button>
<p class="text-center text-xs text-on-surface-variant/60 font-label tracking-wide uppercase">
                Ready to resume your shift?
            </p>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-8 pb-6 pt-2 bg-[#131314]/90 backdrop-blur-xl">
<!-- Home -->
<div class="flex flex-col items-center justify-center bg-[#276EF1] text-white rounded-full p-3 scale-110 -translate-y-2 transition-all cursor-pointer">
<span class="material-symbols-outlined" data-icon="home" data-weight="fill" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-['Inter'] text-[8px] font-medium uppercase tracking-widest mt-0.5">Home</span>
</div>
<!-- Earnings -->
<div class="flex flex-col items-center justify-center text-slate-500 p-2 hover:text-[#b1c5ff] transition-colors cursor-pointer">
<span class="material-symbols-outlined" data-icon="payments">payments</span>
<span class="font-['Inter'] text-[10px] font-medium uppercase tracking-widest">Earnings</span>
</div>
<!-- Rating -->
<div class="flex flex-col items-center justify-center text-slate-500 p-2 hover:text-[#b1c5ff] transition-colors cursor-pointer">
<span class="material-symbols-outlined" data-icon="star">star</span>
<span class="font-['Inter'] text-[10px] font-medium uppercase tracking-widest">Rating</span>
</div>
<!-- Account -->
<div class="flex flex-col items-center justify-center text-slate-500 p-2 hover:text-[#b1c5ff] transition-colors cursor-pointer">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-['Inter'] text-[10px] font-medium uppercase tracking-widest">Account</span>
</div>
</nav>
<!-- Visual Polish: Top Gradient Overlay -->
<div class="fixed top-0 inset-x-0 h-40 bg-gradient-to-b from-surface to-transparent pointer-events-none z-40 opacity-50"></div>
<script src="../apps/prd-manifest.js"></script>
<script src="../apps/prd-runtime.js"></script>
</body></html>
